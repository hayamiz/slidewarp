name: release

# vX.Y.Z タグを push するとトリガーされ、各プラットフォーム向けバイナリをビルドして
# GitHub Release にアップロードする。ソースコード一式（zip/tar.gz）は GitHub が自動で
# 各 Release に添付する。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Release の作成・アセットのアップロードに必要

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl # 依存なしの完全静的バイナリ
          - os: macos-latest
            target: aarch64-apple-darwin # Apple Silicon
          - os: macos-13
            target: x86_64-apple-darwin # Intel Mac
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          bin=slidewarp
          dist="slidewarp-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/$bin" "$dist/"
          cp README.md LICENSE "$dist/"
          tar czf "$dist.tar.gz" "$dist"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$dist.tar.gz" > "$dist.tar.gz.sha256"
          else
            shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"
          fi

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # タグに対応する Release を作成（無ければ）し、アセットを追記する。
          generate_release_notes: true
          files: |
            slidewarp-*.tar.gz
            slidewarp-*.tar.gz.sha256
